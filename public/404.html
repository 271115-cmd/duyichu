<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not found · 都一处 Duyichu</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <meta name="theme-color" content="#C60707">
  <meta name="robots" content="noindex">
  <style>
    :root { --red:#C60707; --cherry:#6E1221; --yellow:#F4FF1E; --ink:#0E0B08; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; }
    body {
      background:var(--cherry); color:#fff; min-height:100%;
      display:flex; align-items:center; justify-content:center; text-align:center;
      font-family:'Archivo',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; padding:2rem; overflow-x:hidden;
    }
    .wrap { max-width:40rem; position:relative; z-index:2; }
    .ghost {
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      font-family:'Archivo',sans-serif; font-weight:900; font-size:min(62vw,52rem); line-height:1;
      color:var(--red); opacity:.16; letter-spacing:-.04em; pointer-events:none; z-index:1; user-select:none;
    }
    .eyebrow { font-weight:800; letter-spacing:.28em; text-transform:uppercase; font-size:.72rem; color:var(--yellow); margin-bottom:1.1rem; }
    h1 { font-weight:900; font-size:clamp(2rem,7vw,4rem); line-height:1.04; letter-spacing:-.02em; }
    h1 em { font-style:italic; color:var(--yellow); }
    p { margin-top:1.2rem; font-size:1.05rem; line-height:1.6; opacity:.92; max-width:34rem; margin-left:auto; margin-right:auto; }
    .links { margin-top:2.2rem; display:flex; gap:.7rem 1rem; flex-wrap:wrap; justify-content:center; }
    .btn {
      display:inline-block; font-weight:800; letter-spacing:.04em; font-size:.92rem;
      padding:.8rem 1.5rem; border-radius:100px; text-decoration:none; border:2px solid var(--yellow); color:var(--yellow);
    }
    .btn.solid { background:var(--yellow); color:var(--ink); }
    .btn:focus-visible { outline:3px solid #fff; outline-offset:3px; }
  </style>
</head>
<body>
  <div class="ghost" aria-hidden="true">404</div>
  <main class="wrap">
    <p class="eyebrow">都一处 · The Only Place</p>
    <h1>That dish isn&rsquo;t<br>on the <em>menu</em></h1>
    <p>The page you&rsquo;re after has wandered off — like a traveler on a cold New Year&rsquo;s Eve. Let&rsquo;s get you back to the warmth.</p>
    <div class="links">
      <a class="btn solid" href="/">Home</a>
      <a class="btn" href="/heritage.html">Heritage</a>
      <a class="btn" href="/menu.html">Menu</a>
      <a class="btn" href="/contact.html">Visit Us</a>
    </div>
  </main>
</body>
</html>
